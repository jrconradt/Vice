name: benchmarks

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Vice.slnx --locked-mode

      - name: Run benchmark gate
        run: dotnet run -c Release --project bench/Vice.Benchmarks/Vice.Benchmarks.csproj --no-restore -- --filter '*' --join --gate

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench/Vice.Benchmarks/bin/Release/net10.0/BenchmarkDotNet.Artifacts/results
          if-no-files-found: ignore

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CI: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Verify tag matches Directory.Build.props version
        run: |
          VERSION="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' Directory.Build.props | head -n1)"
          if [[ -z "$VERSION" ]]; then
            echo "error: could not read <Version> from Directory.Build.props" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "error: tag ${GITHUB_REF_NAME} does not match version v${VERSION} in Directory.Build.props" >&2
            exit 1
          fi

      - name: Restore
        run: dotnet restore Vice.slnx --locked-mode

      - name: Build
        run: dotnet build Vice.slnx --no-restore --configuration Release

      - name: Format check
        run: dotnet format Vice.slnx --verify-no-changes --no-restore

      - name: Test
        run: dotnet test Vice.slnx --no-build --configuration Release --logger "console;verbosity=minimal"

      - name: Pack and push
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: scripts/release.sh --push --verify-tag

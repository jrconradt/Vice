name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  CI: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Vice.slnx --locked-mode

      - name: Build
        run: dotnet build Vice.slnx --no-restore --configuration Release

      - name: Format check
        run: dotnet format Vice.slnx --verify-no-changes --no-restore

      - name: Test
        run: >-
          dotnet test Vice.slnx --no-build --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory artifacts/test-results
          --logger "console;verbosity=minimal"
          --logger "junit;LogFilePath=artifacts/test-results/{assembly}.junit.xml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: error

  pack-install-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Pack
        run: |
          dotnet pack src/Vice.Parser/Vice.Parser.csproj -c Release -o artifacts/local-nupkg --nologo
          dotnet pack src/Vice/Vice.csproj -c Release -o artifacts/local-nupkg --nologo
          dotnet pack src/Vice.Cli/Vice.Cli.csproj -c Release -o artifacts/local-nupkg --nologo
          dotnet pack src/Vice.Mux.Cli/Vice.Mux.Cli.csproj -c Release -o artifacts/local-nupkg --nologo

      - name: Install tools into tool path
        run: |
          dotnet tool install Vice.Cli --tool-path artifacts/tools --configfile nuget.config
          dotnet tool install Vice.Mux.Cli --tool-path artifacts/tools --configfile nuget.config

      - name: Invoke installed tools
        run: |
          ./artifacts/tools/vice --version
          ./artifacts/tools/vice-mux --version
